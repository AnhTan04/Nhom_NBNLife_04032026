<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang Đăng Nhập</title>
</head>

<body>

    <h2>Đăng nhập hệ thống</h2>

    <form>
        <!-- Tên đăng nhập -->
        <label for="txtUsername">Tên đăng nhập:</label><br>
        <input type="text" id="txtUsername" name="txtUsername" placeholder="Nhập tên đăng nhập"><br><br>

        <!-- Mật khẩu -->
        <label for="txtMatKhau">Mật khẩu:</label><br>
        <input type="password" id="txtMatKhau" name="txtMatKhau" placeholder="Nhập mật khẩu"><br><br>

        <!-- Nút đăng nhập -->
        <button type="submit">Đăng nhập</button>
    </form>

</body>

</html>
