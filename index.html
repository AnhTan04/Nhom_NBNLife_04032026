<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Đăng Nhập</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h2 class="text-center mb-4">Đăng nhập hệ thống</h2>

            <form>
                <!-- Tên đăng nhập -->
                <div class="mb-3">
                    <label for="txtUsername" class="form-label">Tên đăng nhập:</label>
                    <input type="text" class="form-control" id="txtUsername" name="txtUsername"
                        placeholder="Nhập tên đăng nhập">
                </div>

                <!-- Mật khẩu -->
                <div class="mb-4">
                    <label for="txtMatKhau" class="form-label">Mật khẩu:</label>
                    <input type="password" class="form-control" id="txtMatKhau" name="txtMatKhau"
                        placeholder="Nhập mật khẩu">
                </div>

                <!-- Nút đăng nhập -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Đăng nhập</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
